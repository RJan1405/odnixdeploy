<!-- Send To Modal -->
<div id="sendToModal" class="od-modal-overlay" style="display: none; z-index: 10005;" onclick="closeSendToModal(event)">
    <div class="od-modal" style="width: 100%; max-width: 400px; height: 80vh; max-height: 600px; border-radius: 16px; background: var(--od-bg); display: flex; flex-direction: column;" onclick="event.stopPropagation()">
        
        <!-- Header -->
        <header class="od-modal-header" style="padding: 16px; border-bottom: 1px solid var(--od-border); display: flex; align-items: center; justify-content: space-between;">
            <h3 style="margin: 0; font-size: 16px; font-weight: 600;">Send to</h3>
            <button onclick="closeSendToModal()" style="background: none; border: none; cursor: pointer; color: var(--od-text-primary);">
                <span class="od-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>
            </button>
        </header>

        <!-- Search -->
        <div style="padding: 12px 16px;">
            <div style="position: relative;">
                <input type="text" id="sendToSearch" placeholder="Search" 
                       style="width: 100%; padding: 10px 12px 10px 36px; background: var(--od-surface); border: none; border-radius: 10px; color: var(--od-text-primary); font-size: 14px; outline: none;">
                <div style="position: absolute; left: 10px; top: 10px; color: var(--od-text-secondary);">
                    <span class="od-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
                </div>
            </div>
            
            <!-- Optional Message -->
            <input type="text" id="sendToMessage" placeholder="Write a message..." 
                   style="width: 100%; margin-top: 12px; padding: 10px 12px; background: transparent; border-bottom: 1px solid var(--od-border); border-top:none; border-left:none; border-right:none; border-radius: 0; color: var(--od-text-primary); font-size: 14px; outline: none;">
        </div>

        <!-- User List -->
        <div id="sendToUserList" style="flex: 1; overflow-y: auto; padding: 0 16px;">
            <!-- Populated by JS -->
            <div style="padding: 20px; text-align: center; color: var(--od-text-secondary);">
                <div class="od-loader" style="margin: 0 auto 10px;"></div>
                Loading...
            </div>
        </div>

        <!-- Footer -->
        <div style="padding: 16px; border-top: 1px solid var(--od-border);">
            <button id="sendShareBtn" onclick="sendShareToSelected()" disabled 
                    style="width: 100%; background: var(--color-primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; opacity: 0.5;">
                Send
            </button>
        </div>
    </div>
</div>

<style>
    .od-user-select-item {
        display: flex;
        align-items: center;
        padding: 10px 0;
        cursor: pointer;
    }
    .od-user-select-checkbox {
        width: 20px;
        height: 20px;
        border: 2px solid var(--od-border);
        border-radius: 50%;
        margin-right: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    .od-user-select-item.selected .od-user-select-checkbox {
        background: var(--color-primary);
        border-color: var(--color-primary);
    }
    .od-user-select-item.selected .od-user-select-checkbox::after {
        content: '';
        width: 10px;
        height: 5px;
        border-left: 2px solid white;
        border-bottom: 2px solid white;
        transform: rotate(-45deg) translate(2px, -2px);
    }
    .section-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--od-text-secondary);
        margin: 16px 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
</style>

<script>
    let selectedShareUsers = new Set();
    let shareUserSearchTimeout = null;

    function closeSendToModal(e) {
        if (e && e.target !== e.currentTarget) return;
        document.getElementById('sendToModal').style.display = 'none';
        selectedShareUsers.clear();
        updateSendButton();
        document.getElementById('sendToMessage').value = '';
        document.getElementById('sendToSearch').value = '';
    }

    async function openSendToModal() {
        document.getElementById('sendToModal').style.display = 'flex';
        selectedShareUsers.clear();
        updateSendButton();
        fetchShareUsers(); // Load initial list
        
        // Setup search listener
        const searchInput = document.getElementById('sendToSearch');
        searchInput.oninput = (e) => {
            clearTimeout(shareUserSearchTimeout);
            shareUserSearchTimeout = setTimeout(() => fetchShareUsers(e.target.value), 300);
        };
    }

    async function fetchShareUsers(query = '') {
        const listContainer = document.getElementById('sendToUserList');
        if (!query) listContainer.innerHTML = '<div class="od-loader" style="margin: 20px auto;"></div>';

        try {
            const response = await fetch(`/api/share/search-users/?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            if (data.success) {
                renderShareUserList(data.results);
            }
        } catch (error) {
            console.error('Error fetching users:', error);
            listContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--od-text-secondary);">Failed to load users</div>';
        }
    }

    function renderShareUserList(users) {
        const listContainer = document.getElementById('sendToUserList');
        listContainer.innerHTML = '';
        
        if (users.length === 0) {
            listContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--od-text-secondary);">No users found</div>';
            return;
        }

        // Group by status/priority if needed, but the API already sorts nicely
        // Let's simpler render linear list but maybe add section headers if priority changes?
        // Actually for simplicity, just render list with status badges
        
        users.forEach(user => {
            const isSelected = selectedShareUsers.has(user.id);
            const item = document.createElement('div');
            item.className = `od-user-select-item ${isSelected ? 'selected' : ''}`;
            item.onclick = () => toggleShareUserSelect(user.id, item);
            
            let statusBadge = '';
            if (user.status_label) {
                statusBadge = `<span style="font-size: 11px; color: var(--od-text-secondary); background: var(--od-surface-hover); padding: 2px 6px; border-radius: 4px; margin-left: 6px;">${user.status_label}</span>`;
            }

            item.innerHTML = `
                <img src="${user.avatar_url}" style="width: 44px; height: 44px; border-radius: 50%; object-fit: cover; margin-right: 12px;">
                <div style="flex: 1;">
                    <div style="font-weight: 600; font-size: 14px; display: flex; align-items: center;">
                        ${user.username}
                        ${user.is_verified ? '<span class="od-verified-badge" style="width: 12px; height: 12px; margin-left: 4px;"></span>' : ''}
                    </div>
                    <div style="font-size: 13px; color: var(--od-text-secondary); display: flex; align-items: center;">
                        ${user.full_name}
                        ${statusBadge}
                    </div>
                </div>
                <div class="od-user-select-checkbox"></div>
            `;
            listContainer.appendChild(item);
        });
    }

    function toggleShareUserSelect(userId, element) {
        if (selectedShareUsers.has(userId)) {
            selectedShareUsers.delete(userId);
            element.classList.remove('selected');
        } else {
            selectedShareUsers.add(userId);
            element.classList.add('selected');
        }
        updateSendButton();
    }

    function updateSendButton() {
        const btn = document.getElementById('sendShareBtn');
        const count = selectedShareUsers.size;
        btn.disabled = count === 0;
        btn.style.opacity = count === 0 ? '0.5' : '1';
        btn.textContent = count > 0 ? `Send (${count})` : 'Send';
    }

    async function sendShareToSelected() {
        if (selectedShareUsers.size === 0) return;
        
        const btn = document.getElementById('sendShareBtn');
        btn.textContent = 'Sending...';
        btn.disabled = true;

        const message = document.getElementById('sendToMessage').value;

        try {
            const response = await fetch('/api/share/send/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCSRFToken() // Assumes global function exists
                },
                body: JSON.stringify({
                    recipient_ids: Array.from(selectedShareUsers),
                    content_type: currentShareType, // Assumes global var from parent
                    content_id: currentShareId,     // Assumes global var from parent
                    message: message
                })
            });

            const data = await response.json();
            
            if (data.success) {
                // Show toast
                if (typeof showIGToast === 'function') {
                    showIGToast('Sent successfully', 'success');
                } else if (typeof showGlobalToast === 'function') {
                    showGlobalToast('Sent successfully', 'success');
                }
                closeSendToModal();
                closeShareModal(); // Close parent modal too
            } else {
                throw new Error(data.error || 'Failed to send');
            }
        } catch (error) {
            console.error('Error sending share:', error);
            if (typeof showIGToast === 'function') {
                showIGToast(error.message || 'Failed to send', 'error');
            }
            btn.textContent = 'Send';
            btn.disabled = false;
        }
    }
</script>
