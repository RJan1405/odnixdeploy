{% extends "admin/base.html" %}

{% block extrahead %}
{{ block.super }}
{# CRITICAL: Prevent white flash - DEFAULT TO DARK THEME #}
<script>
(function() {
    var theme = localStorage.getItem('odnix-admin-theme');
    var html = document.documentElement;
    // DEFAULT TO DARK if no theme is set
    if (!theme) {
        theme = 'dark';
        localStorage.setItem('odnix-admin-theme', 'dark');
    }
    if (theme === 'dark') {
        html.classList.add('dark-theme');
        html.classList.remove('light-theme');
        html.setAttribute('data-theme', 'dark');
    } else {
        html.classList.add('light-theme');
        html.classList.remove('dark-theme');
        html.setAttribute('data-theme', 'light');
    }
})();
</script>
<style>
/* Immediate theme background - prevents white flash */
/* DEFAULT: Dark theme background */
html,
html:not(.light-theme),
html.dark-theme,
html.dark-theme body,
html.dark-theme .wrapper,
html.dark-theme .content-wrapper {
    background-color: #0f172a !important;
}
html.light-theme,
html.light-theme body,
html.light-theme .wrapper,
html.light-theme .content-wrapper {
    background-color: #f1f5f9 !important;
}
</style>
<!-- Inter font for professional look -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
{% endblock %}
